<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家庭提醒 · Apple 風格樣板</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --sep:#e3e3e8;
    --ink:#1d1d1f; --ink2:#6e6e73; --blue:#007aff;
    --school:#ff3b30; --class:#ff9500; --special:#af52de;
    --summer:#ffcc00; --routine:#34c759;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
    --r:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang TC","Helvetica Neue",Arial,"Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* 頂部 frosted nav */
  .nav{
    position:sticky; top:0; z-index:20;
    background:rgba(245,245,247,.72); backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:.5px solid var(--sep);
    padding:calc(env(safe-area-inset-top) + 10px) 20px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .nav h1{font-size:22px; font-weight:700; letter-spacing:.2px; margin:0;}
  .nav .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,#ff9a8b,#ff6a88);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;
  }
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 120px;}

  /* Hero — 今日 */
  .hero{
    background:linear-gradient(135deg,#007aff,#4ab6ff);
    color:#fff;border-radius:var(--r);padding:22px 22px 20px;
    box-shadow:var(--shadow);margin-bottom:18px;
  }
  .hero .date{font-size:15px;opacity:.92;font-weight:500;}
  .hero .big{font-size:34px;font-weight:700;margin-top:4px;letter-spacing:.3px;}
  .hero .sub{font-size:14px;opacity:.9;margin-top:6px;}

  /* 卡片 */
  .card{
    background:var(--card);border-radius:var(--r);
    box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px;
  }
  .card h2{font-size:19px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .card h2 .ic{font-size:20px;}

  /* 今日列表 */
  .today-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:.5px solid var(--sep);}
  .today-item:last-child{border-bottom:none;}
  .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
  .today-item .t{font-weight:700;font-size:15px;min-width:54px;text-align:right;font-variant-numeric:tabular-nums;}
  .today-item .n{font-size:15px;font-weight:600;flex:1;}
  .today-item .c{font-size:12px;color:var(--ink2);}

  /* 分組標題 */
  .group-title{font-size:13px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px;margin:18px 6px 8px;}

  /* 提醒列 */
  .rem{
    display:flex;align-items:center;gap:14px;padding:14px 16px;
    background:var(--card);border-radius:18px;box-shadow:var(--shadow);margin-bottom:10px;
  }
  .rem .time{font-size:16px;font-weight:700;min-width:50px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);}
  .rem .body{flex:1;min-width:0;}
  .rem .name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rem .meta{font-size:13px;color:var(--ink2);margin-top:2px;}
  .rem .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff;flex:0 0 auto;}

  /* 新增 FAB */
  .fab{
    position:fixed;right:max(20px,env(safe-area-inset-right));
    bottom:calc(env(safe-area-inset-bottom) + 22px);
    width:60px;height:60px;border-radius:50%;border:none;
    background:var(--blue);color:#fff;font-size:30px;font-weight:300;line-height:1;
    box-shadow:0 6px 20px rgba(0,122,255,.45);cursor:pointer;z-index:30;
    transition:transform .15s ease;
  }
  .fab:active{transform:scale(.92);}

  /* Apple sheet modal */
  .sheet-mask{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;
    display:none;align-items:flex-end;justify-content:center;
  }
  .sheet-mask.open{display:flex;}
  .sheet{
    width:100%;max-width:520px;background:#f2f2f7;border-radius:18px 18px 0 0;
    padding:10px 18px calc(env(safe-area-inset-bottom) + 24px);
    animation:rise .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .grab{width:38px;height:5px;border-radius:3px;background:#c7c7cc;margin:6px auto 14px;}
  .sheet h3{font-size:20px;font-weight:700;text-align:center;margin:0 0 18px;}
  .field{margin-bottom:16px;}
  .field label{font-size:13px;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px;padding-left:4px;}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--sep);background:#fff;border-radius:12px;
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}
  .field textarea{resize:none;min-height:64px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    padding:9px 15px;border-radius:999px;border:1px solid var(--sep);
    background:#fff;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;
  }
  .chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}
  .row2{display:flex;gap:12px;}
  .row2 .field{flex:1;}
  .btn-primary{
    width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;
    padding:15px;font-size:17px;font-weight:600;cursor:pointer;margin-top:4px;
  }
  .btn-primary:active{opacity:.85;}
  .empty{text-align:center;color:var(--ink2);font-size:14px;padding:24px 0;}
</style>
</head>
<body>

  <nav class="nav">
    <h1>家庭提醒</h1>
    <div class="avatar">K</div>
  </nav>

  <div class="wrap">

    <div class="hero">
      <div class="date" id="heroDate">2026年7月14日 星期二</div>
      <div class="big">今日 3 項日程</div>
      <div class="sub">最新：鋼琴班 15:00 · 網球班 09:00</div>
    </div>

    <div class="card">
      <h2><span class="ic">🌞</span>今日日程</h2>
      <div class="today-item">
        <span class="dot" style="background:var(--summer)"></span>
        <span class="t">09:00</span>
        <span class="n">網球班</span>
        <span class="c">EPPIE</span>
      </div>
      <div class="today-item">
        <span class="dot" style="background:var(--class)"></span>
        <span class="t">15:00</span>
        <span class="n">鋼琴班</span>
        <span class="c">KEN</span>
      </div>
      <div class="today-item">
        <span class="dot" style="background:var(--school)"></span>
        <span class="t">18:30</span>
        <span class="n">功課溫習</span>
        <span class="c">ALL</span>
      </div>
    </div>

    <div class="group-title">即將到來</div>

    <div class="rem">
      <span class="time">07/22</span>
      <div class="body">
        <div class="name">網球班（暑期）</div>
        <div class="meta">星期三 09:00 · 坪石青協</div>
      </div>
      <span class="tag" style="background:var(--summer)">暑期</span>
    </div>

    <div class="rem">
      <span class="time">08/29</span>
      <div class="body">
        <div class="name">嶺南小學面試</div>
        <div class="meta">星期六 12:00 · 時間待定</div>
      </div>
      <span class="tag" style="background:var(--school)">升小</span>
    </div>

    <div class="rem">
      <span class="time">08/30</span>
      <div class="body">
        <div class="name">Jarvis 生日會</div>
        <div class="meta">星期日 13:00 · 樂富冒險樂園</div>
      </div>
      <span class="tag" style="background:var(--special)">特別</span>
    </div>

  </div>

  <button class="fab" id="fab" aria-label="新增提醒">+</button>

  <div class="sheet-mask" id="mask">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="grab"></div>
      <h3>新增提醒</h3>
      <div class="field">
        <label>名稱</label>
        <input id="f_name" placeholder="例如：鋼琴班">
      </div>
      <div class="row2">
        <div class="field">
          <label>日期</label>
          <input id="f_date" type="date" value="2026-07-20">
        </div>
        <div class="field">
          <label>時間</label>
          <input id="f_time" type="time" value="15:00">
        </div>
      </div>
      <div class="field">
        <label>類別</label>
        <div class="chips" id="f_cat">
          <span class="chip on" data-v="school">升小</span>
          <span class="chip" data-v="class">興趣班</span>
          <span class="chip" data-v="special">特別</span>
          <span class="chip" data-v="summer">暑期</span>
          <span class="chip" data-v="routine">日常</span>
        </div>
      </div>
      <div class="field">
        <label>負責人</label>
        <select id="f_care">
          <option>KEN</option><option>EPPIE</option><option>ALL</option>
        </select>
      </div>
      <div class="field">
        <label>備註</label>
        <textarea id="f_note" placeholder="選填：地點、注意事項…"></textarea>
      </div>
      <button class="btn-primary" id="save">加入提醒</button>
    </div>
  </div>

<script>
  // 頂部日期
  (function(){
    const d=new Date();
    const w=['日','一','二','三','四','五','六'][d.getDay()];
    document.getElementById('heroDate').textContent=
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w}`;
  })();

  const mask=document.getElementById('mask');
  document.getElementById('fab').onclick=()=>mask.classList.add('open');
  mask.onclick=e=>{ if(e.target===mask) mask.classList.remove('open'); };

  // 類別 chip 單選
  let cat='school';
  document.getElementById('f_cat').onclick=e=>{
    const c=e.target.closest('.chip'); if(!c)return;
    document.querySelectorAll('#f_cat .chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); cat=c.dataset.v;
  };

  // 儲存（樣板：只喺記憶體加一列，實際請 call 你嘅 API）
  document.getElementById('save').onclick=()=>{
    const name=document.getElementById('f_name').value.trim();
    if(!name){ alert('請填寫名稱'); return; }
    const date=document.getElementById('f_date').value;
    const time=document.getElementById('f_time').value;
    const care=document.getElementById('f_care').value;
    const note=document.getElementById('f_note').value.trim();
    const colors={school:'var(--school)',class:'var(--class)',special:'var(--special)',summer:'var(--summer)',routine:'var(--routine)'};
    const labels={school:'升小',class:'興趣班',special:'特別',summer:'暑期',routine:'日常'};
    const wrap=document.querySelector('.wrap');
    const el=document.createElement('div');
    el.className='rem';
    el.innerHTML=`<span class="time">${date.slice(5)}</span>
      <div class="body"><div class="name">${name}</div>
      <div class="meta">${time} · ${note||'—'}</div></div>
      <span class="tag" style="background:${colors[cat]}">${labels[cat]}</span>`;
    wrap.appendChild(el);
    mask.classList.remove('open');
    document.getElementById('f_name').value='';
    document.getElementById('f_note').value='';
  };
</script>
</body>
</html>
