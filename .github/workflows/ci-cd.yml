name: CI/CD Pipeline

# ════════════════════════════════════════════════════════════════
# 統一部署流水線（取代舊嘅 deploy.yml + deploy-pages.yml）
# 流程：push master → ① 驗證閘 → ② 部署 gh-pages → ③ 上線驗證
#       若上線驗證失敗 → 自動回滾上一版 + 開 Incident Issue
# 你（用家）完全唔使郁手：改完 code push 就去晒，壞嘢唔會上 live。
#
# 2026-07-19 增強：validate 加入「公開發佈零 PII 閘門」
#   - 掃描身份字串（真實姓名 / 舊 GitHub 帳號 / 出生日期 等）
#   - 排除 data.json 與 backups/（家庭電話等必要資料，唔可誤判）
#   - 禁字以 base64 儲存於下方陣列，避免本檔自身洩漏明文 PII
#   - 一旦命中即 abort 部署，確保私隱唔會出街
# ════════════════════════════════════════════════════════════════

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  # ───────────────────────── ① 驗證閘 ─────────────────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: JS 語法檢查（全部 .js，排除 node_modules/backups）
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if node --check "$f" 2>/tmp/err; then
              echo "✓ $f"
            else
              echo "✗ $f"; cat /tmp/err; fail=1
            fi
          done < <(find . -name '*.js' -not -path './node_modules/*' -not -path './backups/*' -not -path './.git/*')
          exit $fail

      - name: data.json 結構驗證
        run: |
          node -e "const d=require('./data.json'); if(!d||!Array.isArray(d.reminders)){console.error('✗ data.json 缺 reminders[]');process.exit(1)} console.log('✓ data.json 有', d.reminders.length, '項提醒')"

      - name: index.html 驗證
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('index.html','utf8');if(h.length<1000){console.error('✗ index.html 太細');process.exit(1)} if(!h.includes('HomeMemo')){console.error('✗ 搵唔到標題標記');process.exit(1)} console.log('✓ index.html OK', h.length, 'bytes')"

      - name: PII Guard — 公開發佈零 PII 閘門
        shell: bash
        run: |
          echo "scanning for forbidden identity PII (excluding data.json, backups)..."
          # 禁字以 base64 儲存，避免本 workflow 檔自身出現明文 PII（仍守護公開零 PII 規則）
          b64_patterns=(
            "Q0hBTiBUQUsgS0lO"   # 真實姓名
            "S0VOODUxMDA0"       # 舊 GitHub 帳號（大寫）
            "a2VuODUxMDA0"       # 舊 GitHub 帳號（細寫）
            "ODUxMDA0"           # 出生編號片段
            "MTk4NS0xMC0wNA=="   # 出生日期（短橫）
            "MTk4NS8xMC8wNA=="   # 出生日期（斜槓）
          )
          hit=0
          for b in "${b64_patterns[@]}"; do
            p=$(printf '%s' "$b" | base64 -d)
            if grep -rIl --exclude=data.json --exclude-dir=.git --exclude-dir=backups --exclude-dir=.github -e "$p" . ; then
              echo "::error::PII guard triggered: $p"
              hit=1
            fi
          done
          if [ "$hit" -ne 0 ]; then
            echo "deploy aborted: identity PII detected in public artifact"
            exit 1
          fi
          echo "PII guard passed"

  # ───────────────────────── ② 部署 ─────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: 建立 _site（含 assets/ 資源）
        run: |
          mkdir -p _site
          for f in index.html sw.js download.html manifest.json robots.txt; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done
          # 自動將 APP_BUILD 占位符替換為 commit SHA（前端 self-heal 對版用）
          sed -i "s/__BUILD__/${GITHUB_SHA:0:7}/g" _site/index.html
          # 同步輸出 home.html 作為防緩存專用入口（全新檔名，iOS/web-clip 無舊快取、無舊 SW 控制）
          cp _site/index.html _site/home.html
          # ★ 關鍵：將 data.json 部署到 GitHub Pages 同源路徑，前端優先讀同源（無 CORS、無外部網絡依賴，iOS 一定讀到）
          [ -f data.json ] && cp data.json _site/data.json || echo "(master 暫無 data.json，跳過同源副本)"
          # 自動寫入版本標記（供前端 self-heal 自動 reload）
          echo "{\"build\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"sha\":\"${GITHUB_SHA:0:7}\"}" > _site/version.json
          echo "version.json -> $(cat _site/version.json)"
          # 複製子目錄資源（CSS / JS / 圖片等），否則美化後嘅 assets/ 唔會上線
          [ -d assets ] && cp -r assets _site/ || true
          [ -d js ] && cp -r js _site/ || true
          echo "📦 部署檔：" && ls -R _site/ | head -40

      - name: 部署到 GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: auto-publish ${{ github.sha }}"

  # ───────────────────────── ③ 上線驗證 + 回滾 ─────────────────────────
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 驗證線上網站
        id: verify
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "🔎 驗證 $URL"
          for i in 1 2 3; do
            sleep 20
            BODY=$(curl -sS "$URL" 2>/dev/null || true)
            if echo "$BODY" | grep -q "HomeMemo"; then
              echo "✅ 上線驗證通過"
              echo "status=ok" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "⏳ retry $i..."
          done
          echo "❌ 上線驗證失敗"
          echo "status=fail" >> "$GITHUB_OUTPUT"
          exit 1

      - name: 回滾到上一個部署
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          if [ "$(git rev-list --count HEAD 2>/dev/null || echo 0)" -gt 1 ]; then
            git reset --hard HEAD~1
            git push --force origin gh-pages
            echo "↩️ 已自動回滾 gh-pages 到上一版"
          else
            echo "⚠️ 無上一版可回滾"
          fi

      - name: 開 Incident Issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = '🚨 部署驗證失敗 — 已自動回滾';
            const body = `CI/CD 上線驗證失敗，系統已自動回滾 gh-pages 到上一個穩定版本。\n\n- commit: ${context.sha}\n- 時間: ${new Date().toISOString()}\n- 請檢查今次 push 嘅改動。`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 50 });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: '再次失敗 @ ' + new Date().toISOString() });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }
