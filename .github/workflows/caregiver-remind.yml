name: Caregiver WhatsApp Reminder (Cloud API)

on:
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7 — GitHub native timer may be dead; see repository_dispatch fallback
  workflow_dispatch:
  repository_dispatch:
    types: [caregiver-tick]

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # Node 22 has global fetch — no baileys needed
      - name: Send caregiver reminders (WhatsApp Cloud API)
        env:
          WA_API_TOKEN: ${{ secrets.WA_API_TOKEN }}
          WA_PHONE_ID:  ${{ secrets.WA_PHONE_ID }}
          WA_TEMPLATE:  ${{ secrets.WA_TEMPLATE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node wa-caregiver-remind.js
      # Driven 24/7 by external hourly triggers (WorkBuddy automation +
      # optional Google Apps Script watchdog) via repository_dispatch
      # caregiver-tick. No self-chain (avoids burning minutes + session churn).
