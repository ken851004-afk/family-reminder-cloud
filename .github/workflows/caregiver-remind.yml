name: Caregiver WhatsApp Reminder (CallMeBot)

on:
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7 — GitHub native timer may be dead; see repository_dispatch fallback
  workflow_dispatch:
  repository_dispatch:
    types: [caregiver-tick]

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # Node 22 has global fetch — no baileys needed
      - name: Send caregiver reminders (CallMeBot WhatsApp Gateway)
        env:
          CALLMEBOT_KEN:     ${{ secrets.CALLMEBOT_KEN }}
          CALLMEBOT_EPPIE:   ${{ secrets.CALLMEBOT_EPPIE }}
          CALLMEBOT_KENNY:   ${{ secrets.CALLMEBOT_KENNY }}
          CALLMEBOT_ROSANNA: ${{ secrets.CALLMEBOT_ROSANNA }}
          CALLMEBOT_COFFE:   ${{ secrets.CALLMEBOT_COFFE }}
          CALLMEBOT_LODOU:   ${{ secrets.CALLMEBOT_LODOU }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: node wa-caregiver-remind.js
      # Driven 24/7 by external hourly triggers (WorkBuddy automation +
      # optional Google Apps Script watchdog) via repository_dispatch
      # caregiver-tick. No self-chain (avoids burning minutes + session churn).
