name: Caregiver WhatsApp Reminder

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wacli
        run: |
          WACLI_VERSION="0.21.0"
          URL="https://github.com/whatsmeow/wacli/releases/download/v${WACLI_VERSION}/wacli_Linux_x86_64.tar.gz"
          curl -L "$URL" -o wacli.tar.gz
          tar -xzf wacli.tar.gz
          chmod +x wacli
          sudo mv wacli /usr/local/bin/
          wacli version

      - name: Restore wacli session from secret
        env:
          WACLI_SESSION_B64: ${{ secrets.WACLI_SESSION_B64 }}
        run: |
          if [ -z "$WACLI_SESSION_B64" ]; then
            echo "::error::WACLI_SESSION_B64 secret not set!"
            echo "Please run: base64 -w0 ~/.wacli/session.db > session.b64"
            echo "Then create GitHub secret WACLI_SESSION_B64 with that content"
            exit 1
          fi
          mkdir -p ~/.wacli
          echo "$WACLI_SESSION_B64" | base64 -d > ~/.wacli/session.db
          echo "Session restored, size: $(wc -c < ~/.wacli/session.db) bytes"

      - name: Install Node dependencies
        run: npm install node-fetch@2

      - name: Run caregiver reminder
        env:
          WACLI_PATH: /usr/local/bin/wacli
        run: node wa-caregiver-remind.js

      - name: Save updated session to output
        if: always()
        run: |
          if [ -f ~/.wacli/session.db ]; then
            B64=$(base64 -w0 ~/.wacli/session.db)
            echo "Updated session size: $(echo -n "$B64" | wc -c) chars"
            echo "$B64" > /tmp/session-updated.b64
          fi

      - name: Upload updated session as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wacli-session-updated
          path: /tmp/session-updated.b64
          retention-days: 7
