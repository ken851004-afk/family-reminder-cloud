name: Caregiver WhatsApp Reminder (Cloud)

on:
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7, no computer needed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install baileys qrcode node-cache pino
      - name: Send caregiver reminders
        env:
          WA_CREDS_B64: ${{ secrets.WA_CREDS_B64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node wa-caregiver-remind.js
