name: Caregiver WhatsApp Reminder (Cloud)

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7 — timer may be disabled by GitHub; see repository_dispatch fallback
  workflow_dispatch:
  repository_dispatch:
    types: [caregiver-tick]

permissions:
  contents: read
  actions: write   # required so this run can re-arm the next run via gh workflow run

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install baileys qrcode node-cache pino
      - name: Send caregiver reminders
        env:
          WA_CREDS_B64: ${{ secrets.WA_CREDS_B64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node wa-caregiver-remind.js
      # NOTE: No self-chain re-arm here on purpose.
      # A self-perpetuating chain for this hourly job would keep a runner
      # permanently busy (~43k min/month) AND thrash the WhatsApp (baileys)
      # session every ~45s. Instead this workflow is driven 24/7 by the
      # external hourly triggers (WorkBuddy automation "Family Reminder Backup
      # Trigger" + optional Google Apps Script watchdog), which cost ~1k min/month.
