<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下載 Family Reminder 本地服務</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; padding: 40px; max-width: 500px; width: 90%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #333; }
    p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s; }
    .btn-primary { background: #09b83b; color: white; }
    .btn-primary:hover { background: #079a32; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .steps { text-align: left; background: #f9f9f9; border-radius: 8px; padding: 16px; margin-top: 20px; font-size: 13px; color: #555; line-height: 1.8; }
    .steps strong { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📲 Family Reminder 本地服務</h1>
    <p>下載啟動腳本，喺你部機運行 WhatsApp 提醒服務</p>
    
    <a href="https://raw.githubusercontent.com/ken851004-afk/family-reminder-cloud/master/start-reminder.bat" 
       download="start-reminder.bat" class="btn btn-primary">
      ⬇️ 下載 start-reminder.bat
    </a>
    
    <a href="https://raw.githubusercontent.com/ken851004-afk/family-reminder-cloud/master/local-reminder-service.js" 
       download="local-reminder-service.js" class="btn btn-secondary">
      ⬇️ 下載 local-reminder-service.js（可選）
    </a>
    
    <div class="steps">
      <strong>使用方法：</strong><br>
      1. 撳上方按鈕下載 <code>start-reminder.bat</code><br>
      2. 雙擊下載好的 <code>.bat</code> 檔<br>
      3. 保持視窗開啟（可最小化）<br>
      4. 完成！服務會每分鐘自動檢查提醒
    </div>
  </div>
</body>
</html>
